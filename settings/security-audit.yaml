name: security-audit
description: Security review mode. No network, no writes, only search and read tools. Maximum safety.

permissions:
  allowed_tools:
    - memory_search
    - memory_get_observations
    - memory_context
    - memory_timeline
    - index_project
    - index_search
    - monitor_status
    - agent_delegate
    - agent_list
    - skill_run
    - skill_list
  blocked_tools: []
  read_only: true
  allow_shell: false
  allow_browser: false
  allow_network: false
